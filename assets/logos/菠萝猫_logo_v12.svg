<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blurLight">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    
    <!-- 金渐层毛色 -->
    <radialGradient id="bodyMain" cx="45%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#F0DCA8"/>
      <stop offset="25%" stop-color="#E0C880"/>
      <stop offset="55%" stop-color="#C8A860"/>
      <stop offset="80%" stop-color="#B08840"/>
      <stop offset="100%" stop-color="#907030"/>
    </radialGradient>
    
    <radialGradient id="bodyShadow" cx="50%" cy="85%" r="45%">
      <stop offset="0%" stop-color="#907030" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6A4A20" stop-opacity="0.35"/>
    </radialGradient>
    
    <radialGradient id="bellyLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8ECD8"/>
      <stop offset="100%" stop-color="#E8D8B8"/>
    </radialGradient>
    
    <radialGradient id="eyeGreen" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#A8E080"/>
      <stop offset="40%" stop-color="#78B850"/>
      <stop offset="80%" stop-color="#489030"/>
      <stop offset="100%" stop-color="#307020"/>
    </radialGradient>
    
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B89048"/>
      <stop offset="50%" stop-color="#C8A860"/>
      <stop offset="100%" stop-color="#D8B870"/>
    </linearGradient>
  </defs>

  <rect width="600" height="700" fill="#F5F0E6"/>

  <!-- ============================================================ -->
  <!-- 菠萝 — 矮脚金渐层 V12 整体连接版 -->
  <!-- 头身一体，连续轮廓，忠实还原照片 -->
  <!-- ============================================================ -->
  <g transform="translate(300, 330)">

    <!-- 地面阴影 -->
    <ellipse cx="0" cy="170" rx="80" ry="14" fill="#C0B8A8" opacity="0.12" filter="url(#blur)"/>

    <!-- ====== 尾巴 ====== -->
    <g>
      <path d="M-68,70 Q-112,82 -126,50 Q-134,15 -118,-18 Q-108,-36 -95,-28" 
            fill="none" stroke="#907030" stroke-width="12" stroke-linecap="round" opacity="0.12" filter="url(#blur)"/>
      <path d="M-68,70 Q-112,82 -126,50 Q-134,15 -118,-18 Q-108,-36 -95,-28" 
            fill="none" stroke="url(#tailGrad)" stroke-width="13" stroke-linecap="round"/>
      <path d="M-68,70 Q-112,82 -126,50 Q-134,15 -118,-18 Q-108,-36 -95,-28" 
            fill="none" stroke="#7A5A28" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
    </g>

    <!-- ====== 身体 — 头身一体连续轮廓 ====== -->
    <!-- 整个猫的身体是一个连续的椭圆/梨形，头直接坐在身体上 -->
    <g>
      <!-- 整体身体阴影 -->
      <ellipse cx="0" cy="50" rx="72" ry="95" fill="#7A5A28" opacity="0.08" filter="url(#blur)"/>
      
      <!-- 主身体 — 从头到臀部的连续丰满形状 -->
      <!-- 这是关键：头 (y=-80) 到身体底部 (y=140) 是一个整体 -->
      <path d="M-5,-145 
               C-30,-143 -55,-130 -65,-105 
               C-78,-80 -88,-40 -86,10 
               C-84,55 -78,95 -62,122 
               C-45,145 -20,152 0,152 
               C20,152 45,145 62,122 
               C78,95 84,55 86,10 
               C88,-40 78,-80 65,-105 
               C55,-130 30,-143 5,-145 Z" 
            fill="url(#bodyMain)"/>
      
      <!-- 底部阴影 -->
      <path d="M-86,10 C-84,55 -78,95 -62,122 C-45,145 -20,152 0,152 C20,152 45,145 62,122 C78,95 84,55 86,10" 
            fill="url(#bodyShadow)"/>
      
      <!-- 腹部浅色区域 -->
      <path d="M-52,10 C-60,40 -60,75 -48,105 C-35,130 -15,142 0,142 C15,142 35,130 48,105 C60,75 60,40 52,10 Z" 
            fill="url(#bellyLight)" opacity="0.5"/>
      
      <!-- 身体高光 -->
      <ellipse cx="-25" cy="-20" rx="40" ry="50" fill="#F0DCA8" opacity="0.15" filter="url(#blurLight)"/>
      
      <!-- 整体轮廓线（淡） -->
      <path d="M-5,-145 C-30,-143 -55,-130 -65,-105 C-78,-80 -88,-40 -86,10 C-84,55 -78,95 -62,122 C-45,145 -20,152 0,152 C20,152 45,145 62,122 C78,95 84,55 86,10 C88,-40 78,-80 65,-105 C55,-130 30,-143 5,-145" 
            fill="none" stroke="#7A5A28" stroke-width="1.2" opacity="0.25"/>
    </g>

    <!-- ====== 后腿（矮脚短粗，在身体下方） ====== -->
    <g>
      <!-- 左后腿 -->
      <ellipse cx="-46" cy="148" rx="26" ry="22" fill="#C09850"/>
      <ellipse cx="-46" cy="148" rx="26" ry="22" fill="none" stroke="#7A5A28" stroke-width="1" opacity="0.25"/>
      <ellipse cx="-46" cy="156" rx="16" ry="10" fill="#7A5A28" opacity="0.15"/>
      <!-- 左脚 -->
      <ellipse cx="-46" cy="168" rx="18" ry="10" fill="#D8B870"/>
      <ellipse cx="-46" cy="168" rx="18" ry="10" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.25"/>
      <path d="M-54,168 Q-52,171 -48,171" fill="none" stroke="#7A5A28" stroke-width="0.7" opacity="0.35"/>
      <path d="M-44,171 Q-40,171 -38,168" fill="none" stroke="#7A5A28" stroke-width="0.7" opacity="0.35"/>

      <!-- 右后腿 -->
      <ellipse cx="46" cy="148" rx="26" ry="22" fill="#C09850"/>
      <ellipse cx="46" cy="148" rx="26" ry="22" fill="none" stroke="#7A5A28" stroke-width="1" opacity="0.25"/>
      <ellipse cx="46" cy="156" rx="16" ry="10" fill="#7A5A28" opacity="0.15"/>
      <ellipse cx="46" cy="168" rx="18" ry="10" fill="#D8B870"/>
      <ellipse cx="46" cy="168" rx="18" ry="10" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.25"/>
      <path d="M54,168 Q52,171 48,171" fill="none" stroke="#7A5A28" stroke-width="0.7" opacity="0.35"/>
      <path d="M44,171 Q40,171 38,168" fill="none" stroke="#7A5A28" stroke-width="0.7" opacity="0.35"/>
    </g>

    <!-- ====== 前爪（举起，在身体前方） ====== -->
    <g>
      <!-- 左前爪 -->
      <path d="M-48,-15 C-68,-35 -65,-58 -60,-72 C-56,-82 -44,-84 -38,-76" 
            fill="none" stroke="#D0A860" stroke-width="16" stroke-linecap="round"/>
      <path d="M-48,-15 C-68,-35 -65,-58 -60,-72 C-56,-82 -44,-84 -38,-76" 
            fill="none" stroke="#B08840" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
      <!-- 爪垫 -->
      <ellipse cx="-48" cy="-78" rx="7" ry="5" fill="#E0C080"/>
      <ellipse cx="-48" cy="-78" rx="7" ry="5" fill="none" stroke="#7A5A28" stroke-width="0.7"/>
      <circle cx="-46" cy="-80" r="1.5" fill="#7A5A28"/>
      <circle cx="-51" cy="-80" r="1.5" fill="#7A5A28"/>
      <ellipse cx="-48" cy="-76" rx="2.5" ry="1.5" fill="#7A5A28"/>

      <!-- 右前爪 -->
      <path d="M48,-15 C68,-35 65,-58 60,-72 C56,-82 44,-84 38,-76" 
            fill="none" stroke="#D0A860" stroke-width="16" stroke-linecap="round"/>
      <path d="M48,-15 C68,-35 65,-58 60,-72 C56,-82 44,-84 38,-76" 
            fill="none" stroke="#B08840" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
      <ellipse cx="48" cy="-78" rx="7" ry="5" fill="#E0C080"/>
      <ellipse cx="48" cy="-78" rx="7" ry="5" fill="none" stroke="#7A5A28" stroke-width="0.7"/>
      <circle cx="46" cy="-80" r="1.5" fill="#7A5A28"/>
      <circle cx="51" cy="-80" r="1.5" fill="#7A5A28"/>
      <ellipse cx="48" cy="-76" rx="2.5" ry="1.5" fill="#7A5A28"/>
    </g>

    <!-- ====== 耳朵（小圆耳，在头顶） ====== -->
    <g>
      <!-- 左耳 -->
      <path d="M-30,-138 C-38,-160 -58,-190 -40,-188 C-28,-186 -20,-158 -18,-148" 
            fill="#C8A860" stroke="#7A5A28" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M-30,-140 C-36,-158 -50,-182 -38,-182 C-32,-180 -26,-158 -22,-148" 
            fill="#E0A898" opacity="0.6"/>

      <!-- 右耳 -->
      <path d="M30,-138 C38,-160 58,-190 40,-188 C28,-186 20,-158 18,-148" 
            fill="#C8A860" stroke="#7A5A28" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M30,-140 C36,-158 50,-182 38,-182 C32,-180 26,-158 22,-148" 
            fill="#E0A898" opacity="0.6"/>
    </g>

    <!-- ====== 眼睛（绿色大眼，在头部位置） ====== -->
    <g>
      <!-- 左眼 -->
      <ellipse cx="-30" cy="-95" rx="18" ry="19" fill="#F0E8D8"/>
      <ellipse cx="-30" cy="-95" rx="18" ry="19" fill="none" stroke="#5A4A3A" stroke-width="1.8"/>
      <ellipse cx="-30" cy="-95" rx="12" ry="13" fill="#5A4A3A"/>
      <ellipse cx="-30" cy="-95" rx="9" ry="10" fill="#3A3A2A"/>
      <ellipse cx="-30" cy="-95" rx="5" ry="7" fill="#1A1A1A"/>
      <ellipse cx="-26" cy="-100" rx="7" ry="4" fill="#80C058" opacity="0.75" transform="rotate(-12,-26,-100)"/>
      <circle cx="-23" cy="-103" r="5" fill="white" opacity="0.95"/>
      <circle cx="-35" cy="-90" r="2.5" fill="white" opacity="0.45"/>

      <!-- 右眼 -->
      <ellipse cx="30" cy="-95" rx="18" ry="19" fill="#F0E8D8"/>
      <ellipse cx="30" cy="-95" rx="18" ry="19" fill="none" stroke="#5A4A3A" stroke-width="1.8"/>
      <ellipse cx="30" cy="-95" rx="12" ry="13" fill="#5A4A3A"/>
      <ellipse cx="30" cy="-95" rx="9" ry="10" fill="#3A3A2A"/>
      <ellipse cx="30" cy="-95" rx="5" ry="7" fill="#1A1A1A"/>
      <ellipse cx="34" cy="-100" rx="7" ry="4" fill="#80C058" opacity="0.75" transform="rotate(12,34,-100)"/>
      <circle cx="37" cy="-103" r="5" fill="white" opacity="0.95"/>
      <circle cx="25" cy="-90" r="2.5" fill="white" opacity="0.45"/>
    </g>

    <!-- ====== 鼻子 ====== -->
    <g>
      <path d="M-7,-75 C-2,-73 2,-73 7,-75 L0,-69 Z" fill="#D88878" stroke="#8A5A4A" stroke-width="0.8" stroke-linejoin="round"/>
      <path d="M0,-69 L0,-63" stroke="#5A4A3A" stroke-width="0.6" opacity="0.3" fill="none"/>
    </g>

    <!-- ====== 嘴巴 ====== -->
    <g>
      <path d="M0,-63 L0,-57" stroke="#5A4A3A" stroke-width="0.8" fill="none"/>
      <path d="M-10,-61 C-4,-53 0,-57 0,-57" stroke="#5A4A3A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M10,-61 C4,-53 0,-57 0,-57" stroke="#5A4A3A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ====== 胡须 ====== -->
    <g opacity="0.3">
      <line x1="-20" y1="-77" x2="-76" y2="-88" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="-20" y1="-72" x2="-78" y2="-70" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="-20" y1="-66" x2="-74" y2="-56" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="20" y1="-77" x2="76" y2="-88" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="20" y1="-72" x2="78" y2="-70" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="20" y1="-66" x2="74" y2="-56" stroke="#8A7A6A" stroke-width="0.7"/>
    </g>
  </g>
</svg>
