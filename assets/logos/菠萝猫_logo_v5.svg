      <circle cx="-33" cy="-103" r="2.5" fill="white" opacity="0.5"/>
      <circle cx="-27" cy="-118" r="1.5" fill="white" opacity="0.3"/>

      <!-- 右眼 -->
      <ellipse cx="28" cy="-108" rx="18" ry="19" fill="#F0E8D8"/>
      <ellipse cx="28" cy="-108" rx="18" ry="19" fill="none" stroke="#4A3A2A" stroke-width="2"/>
      <ellipse cx="28" cy="-108" rx="12" ry="13" fill="#5A4A3A"/>
      <ellipse cx="28" cy="-108" rx="9" ry="10" fill="#3A3A2A"/>
      <ellipse cx="28" cy="-108" rx="5" ry="7" fill="#1A1A1A"/>
      <ellipse cx="31" cy="-112" rx="6" ry="3.5" fill="#80A850" opacity="0.6" transform="rotate(15,31,-112)"/>
      <ellipse cx="25" cy="-104" rx="3" ry="2" fill="#90B860" opacity="0.3" transform="rotate(10,25,-104)"/>
      <circle cx="33" cy="-115" r="5" fill="white" opacity="0.95"/>
      <circle cx="23" cy="-103" r="2.5" fill="white" opacity="0.5"/>
      <circle cx="27" cy="-118" r="1.5" fill="white" opacity="0.3"/>

      <!-- 眼睛周围轮廓 -->
      <path d="M-46,-108 Q-38,-122 -28,-124 Q-18,-122 -12,-108" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>
      <path d="M12,-108 Q18,-122 28,-124 Q38,-122 46,-108" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>
      
      <!-- 眉毛 -->
