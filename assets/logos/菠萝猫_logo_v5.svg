<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <!-- 素描纸纹理 -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <!-- 铅笔纹理 -->
    <filter id="pencil">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <!-- 石墨粉阴影 -->
    <filter id="graphite">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- 暖白素描纸 -->
  <rect width="600" height="700" fill="#F5F0E6"/>
  <rect width="600" height="700" fill="#EBE5D9" opacity="0.4" filter="url(#paper)"/>

  <!-- 画面边界 -->
  <rect x="30" y="30" width="540" height="640" rx="8" fill="none" stroke="#C8BEA8" stroke-width="0.8" opacity="0.25"/>

  <!-- ============================================================ -->
  <!-- 菠萝 — 矮脚金渐层 写实素描 V5 -->
  <!-- 特征：圆脸圆身、短腿、金棕色皮毛、大圆眼、站立举爪 -->
  <!-- ============================================================ -->
  <g transform="translate(300, 320)" filter="url(#pencil)">

    <!-- ========== 背景环境 — 绿色水磨石地面 ========== -->
    <path d="M-260,185 Q-120,165 0,165 Q120,165 260,185" fill="none" stroke="#A0A890" stroke-width="0.8" opacity="0.2"/>
    <path d="M-240,190 Q-100,172 0,172 Q100,172 240,190" fill="none" stroke="#A0A890" stroke-width="0.6" opacity="0.15"/>
    <path d="M-220,195 Q-90,178 0,178 Q90,178 220,195" fill="none" stroke="#A0A890" stroke-width="0.5" opacity="0.1"/>
    <!-- 水磨石石粒 -->
    <ellipse cx="-160" cy="178" rx="4" ry="3" fill="#B0B8A0" opacity="0.12"/>
    <ellipse cx="-80" cy="170" rx="3" ry="2" fill="#C0A880" opacity="0.1"/>
    <ellipse cx="50" cy="168" rx="5" ry="3" fill="#B0B8A0" opacity="0.12"/>
    <ellipse cx="140" cy="175" rx="3" ry="3" fill="#A09080" opacity="0.1"/>
    <ellipse cx="190" cy="182" rx="4" ry="2" fill="#B0B8A0" opacity="0.1"/>
    <ellipse cx="-40" cy="174" rx="2" ry="2" fill="#C0A880" opacity="0.08"/>

    <!-- ========== 背景纸箱轮廓（极淡） ========== -->
    <rect x="-215" y="-130" width="70" height="80" rx="2" fill="none" stroke="#C8BEA8" stroke-width="0.6" opacity="0.1"/>
    <line x1="-215" y1="-110" x2="-145" y2="-110" stroke="#C8BEA8" stroke-width="0.5" opacity="0.08"/>
    <line x1="-215" y1="-90" x2="-145" y2="-90" stroke="#C8BEA8" stroke-width="0.5" opacity="0.08"/>
    <rect x="140" y="-140" width="60" height="70" rx="2" fill="none" stroke="#C8BEA8" stroke-width="0.6" opacity="0.08"/>
    <line x1="140" y1="-122" x2="200" y2="-122" stroke="#C8BEA8" stroke-width="0.5" opacity="0.06"/>

    <!-- ========== 圆形猫抓板 ========== -->
    <ellipse cx="190" cy="160" rx="35" ry="10" fill="none" stroke="#C8BEA8" stroke-width="0.6" opacity="0.08"/>
    <ellipse cx="190" cy="158" rx="30" ry="8" fill="none" stroke="#C8BEA8" stroke-width="0.5" opacity="0.06"/>

    <!-- ========== 阴影（猫脚下） ========== -->
    <ellipse cx="0" cy="180" rx="65" ry="10" fill="#8A7A6A" opacity="0.06" filter="url(#graphite)"/>

    <!-- ========== 尾巴 ========== -->
    <g filter="url(#graphite)">
      <!-- 尾巴底稿 -->
      <path d="M-80,60 Q-125,70 -140,35 Q-150,0 -130,-35 Q-115,-60 -95,-45" 
            fill="none" stroke="#8A7A6A" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
      <!-- 尾巴主线条 -->
      <path d="M-75,58 Q-120,65 -135,32 Q-145,-2 -125,-32 Q-112,-52 -92,-40" 
            fill="none" stroke="#5A4A3A" stroke-width="2.5" stroke-linecap="round"/>
      <!-- 尾巴毛发排线 -->
      <path d="M-125,50 Q-130,45 -128,38" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-130,35 Q-135,28 -132,20" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-130,15 Q-135,8 -130,0" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-125,-15 Q-128,-22 -122,-28" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-120,58 Q-125,52 -122,45" fill="none" stroke="#5A4A3A" stroke-width="0.5" opacity="0.3"/>
      <!-- 尾巴下方阴影 -->
      <path d="M-70,62 Q-100,70 -120,50" fill="none" stroke="#8A7A6A" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- ========== 身体 — 圆润金渐层 ========== -->
    <g filter="url(#graphite)">
      <!-- 身体底稿 -->
      <path d="M-72,-25 Q-88,15 -88,55 Q-88,95 -68,120 Q-40,140 0,140 Q40,140 68,120 Q88,95 88,55 Q88,15 72,-25" 
            fill="none" stroke="#8A7A6A" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
      
      <!-- 身体主轮廓 -->
      <path d="M-70,-22 Q-85,18 -85,58 Q-85,95 -65,118 Q-38,138 0,138 Q38,138 65,118 Q85,95 85,58 Q85,18 70,-22" 
            fill="none" stroke="#4A3A2A" stroke-width="2.2" stroke-linecap="round"/>
      
      <!-- 身体左侧阴影排线 -->
      <path d="M-70,-15 Q-82,20 -82,58" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.3"/>
      <path d="M-65,-5 Q-78,25 -78,60" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.25"/>
      <path d="M-60,5 Q-74,30 -74,62" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-65,70 Q-75,80 -72,92" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-58,80 Q-68,90 -65,100" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
      
      <!-- 身体右侧排线 -->
      <path d="M70,-15 Q82,20 82,58" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M65,-5 Q78,25 78,60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>

      <!-- 腹部排线 -->
      <path d="M-30,125 Q0,135 30,125" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-20,130 Q0,138 20,130" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.15"/>
      <path d="M-10,132 Q0,140 10,132" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.12"/>
      
      <!-- 身体毛发排线 -->
      <path d="M-55,20 Q-58,25 -55,30" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M-52,35 Q-55,40 -52,45" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M-48,50 Q-52,55 -48,60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M55,20 Q58,25 55,30" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
      <path d="M52,35 Q55,40 52,45" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
      <path d="M48,50 Q52,55 48,60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- ========== 左后腿（矮脚） ========== -->
    <g filter="url(#graphite)">
      <path d="M-48,122 Q-55,148 -52,168 Q-48,178 -38,178 Q-28,178 -24,168 Q-20,155 -22,138" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M-42,125 Q-48,145 -45,162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3"/>
      <path d="M-38,128 Q-44,145 -42,160" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <!-- 脚趾 -->
      <path d="M-42,175 Q-40,178 -36,178" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <path d="M-32,178 Q-28,178 -26,175" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <!-- 脚部阴影 -->
      <ellipse cx="-38" cy="176" rx="12" ry="4" fill="#4A3A2A" opacity="0.08"/>
    </g>

    <!-- ========== 右后腿（矮脚） ========== -->
    <g filter="url(#graphite)">
      <path d="M48,122 Q55,148 52,168 Q48,178 38,178 Q28,178 24,168 Q20,155 22,138" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M42,125 Q48,145 45,162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3"/>
      <path d="M38,128 Q44,145 42,160" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M42,175 Q40,178 36,178" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <path d="M32,178 Q28,178 26,175" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <ellipse cx="38" cy="176" rx="12" ry="4" fill="#4A3A2A" opacity="0.08"/>
    </g>

    <!-- ========== 左前爪（举起，无玩具） ========== -->
    <g filter="url(#graphite)">
      <!-- 左前肢举起 -->
      <path d="M-58,-10 Q-72,-38 -68,-65 Q-65,-85 -55,-88 Q-45,-88 -42,-78" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <!-- 阴影排线 -->
      <path d="M-55,-15 Q-66,-40 -62,-62" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
      <path d="M-50,-20 Q-60,-42 -56,-60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <!-- 爪垫 -->
      <circle cx="-50" cy="-85" r="2" fill="#4A3A2A"/>
      <circle cx="-56" cy="-84" r="2" fill="#4A3A2A"/>
      <ellipse cx="-53" cy="-79" rx="3.5" ry="2.5" fill="#4A3A2A"/>
      <!-- 小爪勾 -->
      <path d="M-48,-88 Q-46,-90 -47,-87" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
      <path d="M-54,-87 Q-56,-89 -55,-86" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
      <!-- 爪内侧绒毛 -->
      <path d="M-45,-75 Q-42,-70 -44,-65" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
    </g>

    <!-- ========== 右前爪（举起，无玩具） ========== -->
    <g filter="url(#graphite)">
      <path d="M58,-10 Q72,-38 68,-65 Q65,-85 55,-88 Q45,-88 42,-78" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M55,-15 Q66,-40 62,-62" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
      <path d="M50,-20 Q60,-42 56,-60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <circle cx="50" cy="-85" r="2" fill="#4A3A2A"/>
      <circle cx="56" cy="-84" r="2" fill="#4A3A2A"/>
      <ellipse cx="53" cy="-79" rx="3.5" ry="2.5" fill="#4A3A2A"/>
      <path d="M48,-88 Q46,-90 47,-87" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
      <path d="M54,-87 Q56,-89 55,-86" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
      <path d="M45,-75 Q42,-70 44,-65" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
    </g>

    <!-- ========== 头部 — 金渐层标准圆脸 ========== -->
    <g filter="url(#graphite)">
      <!-- 头部底稿 -->
      <path d="M-70,-70 Q-78,-105 -62,-135 Q-40,-162 0,-166 Q40,-162 62,-135 Q78,-105 70,-70" 
            fill="none" stroke="#8A7A6A" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
      
      <!-- 头部主轮廓 -->
