      <path d="M18,-128 Q30,-134 40,-128" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
    </g>

    <!-- ========== 鼻子 ========== -->
    <g>
      <path d="M-7,-90 L7,-90 L0,-85 Z" fill="#D09080" stroke="#8A5A4A" stroke-width="0.8" stroke-linejoin="round"/>
      <path d="M0,-85 L0,-78" stroke="#4A3A2A" stroke-width="0.6" opacity="0.4" fill="none"/>
      <!-- 鼻子阴影 -->
      <path d="M-5,-88 Q0,-84 5,-88" fill="none" stroke="#B07060" stroke-width="0.5" opacity="0.3"/>
    </g>

    <!-- ========== 嘴巴 ========== -->
