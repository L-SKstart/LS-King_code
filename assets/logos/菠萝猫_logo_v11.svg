<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <!-- 柔化 -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blurLight">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    
    <!-- 金渐层毛色渐变 -->
    <radialGradient id="bodyMain" cx="45%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#F0D8A0"/>
      <stop offset="30%" stop-color="#E0C078"/>
      <stop offset="60%" stop-color="#C8A058"/>
      <stop offset="85%" stop-color="#A88038"/>
      <stop offset="100%" stop-color="#907030"/>
    </radialGradient>
    
    <radialGradient id="bodyShadow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#A88038" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7A5A28" stop-opacity="0.4"/>
    </radialGradient>
    
    <radialGradient id="bellyLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8ECD8"/>
      <stop offset="60%" stop-color="#EDD8B8"/>
      <stop offset="100%" stop-color="#E0C8A0"/>
    </radialGradient>
    
    <radialGradient id="headMain" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#F0DCA8"/>
      <stop offset="40%" stop-color="#E0C880"/>
      <stop offset="75%" stop-color="#C8A860"/>
      <stop offset="100%" stop-color="#B08840"/>
    </radialGradient>
    
    <radialGradient id="earInner" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#E8A898"/>
      <stop offset="100%" stop-color="#D08070"/>
    </radialGradient>
    
    <radialGradient id="eyeGreen" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#A8E080"/>
      <stop offset="40%" stop-color="#78B850"/>
      <stop offset="80%" stop-color="#489030"/>
      <stop offset="100%" stop-color="#307020"/>
    </radialGradient>
    
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B89048"/>
      <stop offset="50%" stop-color="#C8A058"/>
      <stop offset="100%" stop-color="#D8B870"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="600" height="700" fill="#F5F0E6"/>

  <!-- ============================================================ -->
  <!-- 菠萝 — 矮脚金渐层 形态优化版 -->
  <!-- ============================================================ -->
  <g transform="translate(300, 330)">

    <!-- ========== 地面阴影 ========== -->
    <ellipse cx="0" cy="175" rx="85" ry="15" fill="#C0B8A8" opacity="0.15" filter="url(#blur)"/>
    <ellipse cx="0" cy="175" rx="55" ry="8" fill="#B0A898" opacity="0.1" filter="url(#blur)"/>

    <!-- ========== 尾巴 ========== -->
    <g>
      <!-- 尾巴阴影 -->
      <path d="M-72,65 Q-118,75 -132,42 Q-140,8 -122,-22 Q-110,-42 -95,-32" 
            fill="none" stroke="#7A5A28" stroke-width="12" stroke-linecap="round" opacity="0.15" filter="url(#blur)"/>
      <!-- 尾巴主体 -->
      <path d="M-72,65 Q-118,75 -132,42 Q-140,8 -122,-22 Q-110,-42 -95,-32" 
            fill="none" stroke="url(#tailGrad)" stroke-width="14" stroke-linecap="round"/>
      <!-- 尾巴轮廓 -->
      <path d="M-72,65 Q-118,75 -132,42 Q-140,8 -122,-22 Q-110,-42 -95,-32" 
            fill="none" stroke="#907030" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </g>

    <!-- ========== 身体 ========== -->
    <g>
      <!-- 身体阴影（下方） -->
      <ellipse cx="0" cy="105" rx="65" ry="45" fill="#7A5A28" opacity="0.15" filter="url(#blur)"/>
      
      <!-- 身体主体 — 梨形 -->
      <path d="M-50,-20 
               C-78,5 -88,45 -84,75 
               C-80,105 -62,130 -35,142 
               C-18,150 18,150 35,142 
               C62,130 80,105 84,75 
               C88,45 78,5 50,-20 Z" 
            fill="url(#bodyMain)"/>
      
      <!-- 身体底部阴影 -->
      <path d="M-84,75 C-80,105 -62,130 -35,142 C-18,150 18,150 35,142 C62,130 80,105 84,75 C88,45 78,5 50,-20" 
            fill="url(#bodyShadow)"/>
      
      <!-- 腹部浅色 -->
      <path d="M-48,20 C-60,50 -62,80 -50,110 C-35,130 -18,138 0,140 C18,138 35,130 50,110 C62,80 60,50 48,20 Z" 
            fill="url(#bellyLight)" opacity="0.6"/>
      
      <!-- 身体高光 -->
      <path d="M-45,-10 C-60,15 -65,40 -60,65" 
            fill="none" stroke="#F0D8A0" stroke-width="8" stroke-linecap="round" opacity="0.25" filter="url(#blurLight)"/>
      
      <!-- 身体轮廓 -->
      <path d="M-50,-20 C-78,5 -88,45 -84,75 C-80,105 -62,130 -35,142 C-18,150 18,150 35,142 C62,130 80,105 84,75 C88,45 78,5 50,-20" 
            fill="none" stroke="#7A5A28" stroke-width="1.5" opacity="0.35"/>
    </g>

    <!-- ========== 后腿（矮脚短粗） ========== -->
    <g>
      <!-- 左后腿 -->
      <ellipse cx="-44" cy="145" rx="26" ry="24" fill="#C09850"/>
      <ellipse cx="-44" cy="145" rx="26" ry="24" fill="none" stroke="#7A5A28" stroke-width="1" opacity="0.3"/>
      <!-- 左后腿阴影 -->
      <ellipse cx="-44" cy="155" rx="18" ry="12" fill="#7A5A28" opacity="0.2"/>
      <!-- 左脚 -->
      <ellipse cx="-44" cy="168" rx="18" ry="10" fill="#D8B870"/>
      <ellipse cx="-44" cy="168" rx="18" ry="10" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.3"/>
      <!-- 脚趾 -->
      <path d="M-52,168 Q-50,172 -46,172" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.4"/>
      <path d="M-42,172 Q-38,172 -36,168" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.4"/>

      <!-- 右后腿 -->
      <ellipse cx="44" cy="145" rx="26" ry="24" fill="#C09850"/>
      <ellipse cx="44" cy="145" rx="26" ry="24" fill="none" stroke="#7A5A28" stroke-width="1" opacity="0.3"/>
      <ellipse cx="44" cy="155" rx="18" ry="12" fill="#7A5A28" opacity="0.2"/>
      <ellipse cx="44" cy="168" rx="18" ry="10" fill="#D8B870"/>
      <ellipse cx="44" cy="168" rx="18" ry="10" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.3"/>
      <path d="M52,168 Q50,172 46,172" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.4"/>
      <path d="M42,172 Q38,172 36,168" fill="none" stroke="#7A5A28" stroke-width="0.8" opacity="0.4"/>
    </g>

    <!-- ========== 前爪（举起） ========== -->
    <g>
      <!-- 左前爪 -->
      <path d="M-52,-15 C-72,-38 -68,-62 -62,-78 C-58,-88 -46,-90 -40,-80" 
            fill="none" stroke="#D0A860" stroke-width="18" stroke-linecap="round"/>
      <path d="M-52,-15 C-72,-38 -68,-62 -62,-78 C-58,-88 -46,-90 -40,-80" 
            fill="none" stroke="#B08840" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <!-- 左爪垫 -->
      <ellipse cx="-50" cy="-84" rx="8" ry="6" fill="#E0C080" stroke="#7A5A28" stroke-width="0.8"/>
      <circle cx="-48" cy="-86" r="1.8" fill="#7A5A28"/>
      <circle cx="-53" cy="-86" r="1.8" fill="#7A5A28"/>
      <ellipse cx="-50" cy="-82" rx="3" ry="2" fill="#7A5A28"/>

      <!-- 右前爪 -->
      <path d="M52,-15 C72,-38 68,-62 62,-78 C58,-88 46,-90 40,-80" 
            fill="none" stroke="#D0A860" stroke-width="18" stroke-linecap="round"/>
      <path d="M52,-15 C72,-38 68,-62 62,-78 C58,-88 46,-90 40,-80" 
            fill="none" stroke="#B08840" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
      <ellipse cx="50" cy="-84" rx="8" ry="6" fill="#E0C080" stroke="#7A5A28" stroke-width="0.8"/>
      <circle cx="48" cy="-86" r="1.8" fill="#7A5A28"/>
      <circle cx="53" cy="-86" r="1.8" fill="#7A5A28"/>
      <ellipse cx="50" cy="-82" rx="3" ry="2" fill="#7A5A28"/>
    </g>

    <!-- ========== 头部 ========== -->
    <g>
      <!-- 头部主体 -->
      <ellipse cx="0" cy="-108" rx="68" ry="62" fill="url(#headMain)"/>
      
      <!-- 脸颊浅色 -->
      <ellipse cx="0" cy="-92" rx="52" ry="40" fill="#EDD8B8" opacity="0.35"/>
      
      <!-- 头部高光 -->
      <ellipse cx="-20" cy="-130" rx="30" ry="25" fill="#F0DCA8" opacity="0.2" filter="url(#blurLight)"/>
      
      <!-- 头部轮廓 -->
      <ellipse cx="0" cy="-108" rx="68" ry="62" fill="none" stroke="#7A5A28" stroke-width="1.5" opacity="0.3"/>
    </g>

    <!-- ========== 耳朵 ========== -->
    <g>
      <!-- 左耳 -->
      <path d="M-48,-152 C-52,-172 -64,-200 -44,-194 C-34,-190 -28,-168 -28,-160" 
            fill="#C8A058" stroke="#7A5A28" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M-46,-156 C-50,-170 -56,-188 -46,-188 C-40,-186 -34,-170 -32,-162" 
            fill="url(#earInner)" opacity="0.7"/>
      
      <!-- 右耳 -->
      <path d="M48,-152 C52,-172 64,-200 44,-194 C34,-190 28,-168 28,-160" 
            fill="#C8A058" stroke="#7A5A28" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M46,-156 C50,-170 56,-188 46,-188 C40,-186 34,-170 32,-162" 
            fill="url(#earInner)" opacity="0.7"/>
    </g>

    <!-- ========== 眼睛（绿色大眼） ========== -->
    <g>
      <!-- 左眼 -->
      <ellipse cx="-32" cy="-102" rx="19" ry="20" fill="#F0E8D8"/>
      <ellipse cx="-32" cy="-102" rx="19" ry="20" fill="none" stroke="#5A4A3A" stroke-width="1.8"/>
      <!-- 瞳孔 -->
      <ellipse cx="-32" cy="-102" rx="13" ry="14" fill="#5A4A3A"/>
      <ellipse cx="-32" cy="-102" rx="10" ry="11" fill="#3A3A2A"/>
      <ellipse cx="-32" cy="-102" rx="5" ry="8" fill="#1A1A1A"/>
      <!-- 绿色虹膜 -->
      <ellipse cx="-28" cy="-107" rx="8" ry="4.5" fill="#80C058" opacity="0.8" transform="rotate(-12,-28,-107)"/>
      <ellipse cx="-36" cy="-97" rx="3.5" ry="2" fill="#A8E080" opacity="0.4" transform="rotate(-8,-36,-97)"/>
      <!-- 高光 -->
      <circle cx="-25" cy="-110" r="5.5" fill="white" opacity="0.95"/>
      <circle cx="-37" cy="-97" r="2.5" fill="white" opacity="0.45"/>
      <circle cx="-30" cy="-113" r="1.5" fill="white" opacity="0.25"/>

      <!-- 右眼 -->
      <ellipse cx="32" cy="-102" rx="19" ry="20" fill="#F0E8D8"/>
      <ellipse cx="32" cy="-102" rx="19" ry="20" fill="none" stroke="#5A4A3A" stroke-width="1.8"/>
      <ellipse cx="32" cy="-102" rx="13" ry="14" fill="#5A4A3A"/>
      <ellipse cx="32" cy="-102" rx="10" ry="11" fill="#3A3A2A"/>
      <ellipse cx="32" cy="-102" rx="5" ry="8" fill="#1A1A1A"/>
      <ellipse cx="36" cy="-107" rx="8" ry="4.5" fill="#80C058" opacity="0.8" transform="rotate(12,36,-107)"/>
      <ellipse cx="28" cy="-97" rx="3.5" ry="2" fill="#A8E080" opacity="0.4" transform="rotate(8,28,-97)"/>
      <circle cx="37" cy="-110" r="5.5" fill="white" opacity="0.95"/>
      <circle cx="27" cy="-97" r="2.5" fill="white" opacity="0.45"/>
      <circle cx="32" cy="-113" r="1.5" fill="white" opacity="0.25"/>

      <!-- 眼周线条 -->
      <path d="M-52,-102 C-42,-122 -22,-124 -14,-102" fill="none" stroke="#5A4A3A" stroke-width="0.5" opacity="0.25"/>
      <path d="M14,-102 C22,-124 42,-122 52,-102" fill="none" stroke="#5A4A3A" stroke-width="0.5" opacity="0.25"/>
    </g>

    <!-- ========== 鼻子 ========== -->
    <g>
      <path d="M-7,-82 C-2,-80 2,-80 7,-82 L0,-76 Z" fill="#D88878" stroke="#8A5A4A" stroke-width="0.8" stroke-linejoin="round"/>
      <path d="M0,-76 L0,-70" stroke="#5A4A3A" stroke-width="0.6" opacity="0.3" fill="none"/>
    </g>

    <!-- ========== 嘴巴 ========== -->
    <g>
      <path d="M0,-70 L0,-64" stroke="#5A4A3A" stroke-width="0.8" fill="none"/>
      <path d="M-12,-68 C-4,-60 0,-64 0,-64" stroke="#5A4A3A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M12,-68 C4,-60 0,-64 0,-64" stroke="#5A4A3A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ========== 胡须 ========== -->
    <g opacity="0.35">
      <line x1="-22" y1="-84" x2="-78" y2="-96" stroke="#8A7A6A" stroke-width="0.8"/>
      <line x1="-22" y1="-78" x2="-80" y2="-76" stroke="#8A7A6A" stroke-width="0.8"/>
      <line x1="-22" y1="-72" x2="-76" y2="-62" stroke="#8A7A6A" stroke-width="0.8"/>
      <line x1="22" y1="-84" x2="78" y2="-96" stroke="#8A7A6A" stroke-width="0.8"/>
      <line x1="22" y1="-78" x2="80" y2="-76" stroke="#8A7A6A" stroke-width="0.8"/>
      <line x1="22" y1="-72" x2="76" y2="-62" stroke="#8A7A6A" stroke-width="0.8"/>
    </g>

    <!-- ========== 胸前/腹部毛流 ========== -->
    <g opacity="0.15">
      <path d="M-20,20 C-25,30 -20,38 -15,30" fill="none" stroke="#7A5A28" stroke-width="0.6" stroke-linecap="round"/>
      <path d="M0,25 C-5,35 0,42 5,35" fill="none" stroke="#7A5A28" stroke-width="0.6" stroke-linecap="round"/>
      <path d="M20,20 C15,30 20,38 25,30" fill="none" stroke="#7A5A28" stroke-width="0.6" stroke-linecap="round"/>
    </g>
  </g>
</svg>
