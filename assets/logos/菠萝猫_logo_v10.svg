<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 750" width="600" height="750">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="softEdge">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <!-- 金渐层毛色 -->
    <radialGradient id="furBody" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#EDD098"/>
      <stop offset="35%" stop-color="#D8B870"/>
      <stop offset="70%" stop-color="#C09850"/>
      <stop offset="100%" stop-color="#A07830"/>
    </radialGradient>
    <radialGradient id="furBelly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5E8D0"/>
      <stop offset="100%" stop-color="#E8D0A8"/>
    </radialGradient>
    <radialGradient id="furHead" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F0D8A0"/>
      <stop offset="60%" stop-color="#D8B870"/>
      <stop offset="100%" stop-color="#B89048"/>
    </radialGradient>
    <radialGradient id="eyeGreen" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#A0D878"/>
      <stop offset="50%" stop-color="#68A848"/>
      <stop offset="100%" stop-color="#408830"/>
    </radialGradient>
  </defs>

  <rect width="600" height="750" fill="#F5F0E6"/>
  <rect width="600" height="750" fill="url(#paper)" opacity="0.15"/>

  <!-- ============================================================ -->
  <!-- 菠萝 — 矮脚金渐层 精确还原 -->
  <!-- 特征：金色无纹毛、矮脚短粗、绿眼、圆脸圆身 -->
  <!-- ============================================================ -->
  <g transform="translate(300, 350)">

    <!-- ====== 色彩层 ====== -->
    <g filter="url(#softEdge)" opacity="0.6">
      <!-- 尾巴 -->
      <path d="M-68,68 Q-115,78 -128,45 Q-135,12 -118,-20 Q-105,-42 -90,-32" 
            fill="none" stroke="url(#furBody)" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
      
      <!-- 身体 — 梨形 -->
      <ellipse cx="0" cy="55" rx="70" ry="80" fill="url(#furBody)"/>
      <ellipse cx="0" cy="80" rx="50" ry="50" fill="url(#furBelly)" opacity="0.7"/>
      <ellipse cx="-20" cy="30" rx="40" ry="45" fill="#EDD098" opacity="0.2"/>
      
      <!-- 后腿 -->
      <ellipse cx="-44" cy="142" rx="28" ry="22" fill="url(#furBody)"/>
      <ellipse cx="44" cy="142" rx="28" ry="22" fill="url(#furBody)"/>
      <ellipse cx="-44" cy="152" rx="18" ry="10" fill="#E8D0A0" opacity="0.4"/>
      <ellipse cx="44" cy="152" rx="18" ry="10" fill="#E8D0A0" opacity="0.4"/>
      
      <!-- 前爪 -->
      <path d="M-58,-15 C-70,-38 -66,-62 -60,-78 C-56,-88 -44,-90 -38,-80" 
            fill="none" stroke="url(#furBody)" stroke-width="22" stroke-linecap="round" opacity="0.7"/>
      <path d="M58,-15 C70,-38 66,-62 60,-78 C56,-88 44,-90 38,-80" 
            fill="none" stroke="url(#furBody)" stroke-width="22" stroke-linecap="round" opacity="0.7"/>
      
      <!-- 头部 -->
      <ellipse cx="0" cy="-108" rx="65" ry="60" fill="url(#furHead)"/>
      <ellipse cx="0" cy="-95" rx="48" ry="38" fill="#F0DCB8" opacity="0.4"/>
      
      <!-- 耳朵 -->
      <path d="M-48,-152 L-62,-195 L-28,-165" fill="url(#furHead)"/>
      <path d="M48,-152 L62,-195 L28,-165" fill="url(#furHead)"/>
      <path d="M-46,-156 L-54,-182 L-32,-165" fill="#E0A898" opacity="0.5"/>
      <path d="M46,-156 L54,-182 L32,-165" fill="#E0A898" opacity="0.5"/>
      
      <!-- 眼睛 -->
      <ellipse cx="-30" cy="-102" rx="18" ry="19" fill="url(#eyeGreen)" opacity="0.45"/>
      <ellipse cx="30" cy="-102" rx="18" ry="19" fill="url(#eyeGreen)" opacity="0.45"/>
      
      <!-- 鼻子 -->
      <path d="M-6,-84 L6,-84 L0,-79 Z" fill="#D08070" opacity="0.55"/>
    </g>

    <!-- ====== 线稿层 ====== -->
    <g>

      <!-- 地面 -->
      <path d="M-290,178 Q-120,158 0,158 Q120,158 290,178" fill="none" stroke="#B0B098" stroke-width="0.8" opacity="0.12"/>
      <path d="M-270,183 Q-100,163 0,163 Q100,163 270,183" fill="none" stroke="#B0B098" stroke-width="0.6" opacity="0.08"/>

      <!-- ===== 尾巴 ===== -->
      <path d="M-68,68 Q-115,78 -128,45 Q-135,12 -118,-20 Q-105,-42 -90,-32" 
            fill="none" stroke="#5A4A3A" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M-120,58 Q-125,50 -122,42" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.3"/>
      <path d="M-125,32 Q-128,25 -124,17" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.3"/>

      <!-- ===== 身体 ===== -->
      <path d="M-52,-20 
               C-75,5 -85,42 -82,72 
               C-80,102 -65,128 -38,142 
               C-20,150 20,150 38,142 
               C65,128 80,102 82,72 
               C85,42 75,5 52,-20" 
            fill="none" stroke="#4A3A2A" stroke-width="2.2" stroke-linecap="round"/>
      
      <path d="M-52,-10 C-72,15 -78,45 -76,72" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-70,80 C-74,100 -62,120 -48,132" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
      
      <!-- 腹部弧线 -->
      <path d="M-35,136 C0,148 35,136 35,136" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.12"/>

      <!-- ===== 左后腿（矮脚短粗） ===== -->
      <path d="M-50,132 C-56,150 -54,165 -50,172 C-46,178 -36,178 -30,172 C-26,165 -24,152 -26,140" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M-44,136 C-50,150 -48,162 -44,168" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <ellipse cx="-40" cy="174" rx="10" ry="3" fill="#4A3A2A" opacity="0.06"/>

      <!-- ===== 右后腿（矮脚短粗） ===== -->
      <path d="M50,132 C56,150 54,165 50,172 C46,178 36,178 30,172 C26,165 24,152 26,140" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M44,136 C50,150 48,162 44,168" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <ellipse cx="40" cy="174" rx="10" ry="3" fill="#4A3A2A" opacity="0.06"/>

      <!-- ===== 左前爪（举起） ===== -->
      <path d="M-52,-15 C-70,-38 -66,-62 -60,-78 C-56,-88 -44,-90 -38,-80" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M-50,-20 C-64,-40 -60,-58 -54,-72" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.18"/>
      <ellipse cx="-48" cy="-84" rx="7" ry="5" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <circle cx="-46" cy="-86" r="1.5" fill="#4A3A2A"/>
      <circle cx="-51" cy="-86" r="1.5" fill="#4A3A2A"/>
      <ellipse cx="-48" cy="-82" rx="2.5" ry="1.5" fill="#4A3A2A"/>

      <!-- ===== 右前爪（举起） ===== -->
      <path d="M52,-15 C70,-38 66,-62 60,-78 C56,-88 44,-90 38,-80" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      <path d="M50,-20 C64,-40 60,-58 54,-72" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.18"/>
      <ellipse cx="48" cy="-84" rx="7" ry="5" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <circle cx="46" cy="-86" r="1.5" fill="#4A3A2A"/>
      <circle cx="51" cy="-86" r="1.5" fill="#4A3A2A"/>
      <ellipse cx="48" cy="-82" rx="2.5" ry="1.5" fill="#4A3A2A"/>

      <!-- ===== 头部（圆脸） ===== -->
      <path d="M-62,-65 
               C-74,-88 -68,-125 -50,-145 
               C-32,-163 32,-163 50,-145 
               C68,-125 74,-88 62,-65 
               C56,-50 -56,-50 -62,-65" 
            fill="none" stroke="#4A3A2A" stroke-width="2.5" stroke-linecap="round"/>
      
      <path d="M-60,-68 C-68,-78 -66,-92 -62,-98" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.2"/>
      <path d="M60,-68 C68,-78 66,-92 62,-98" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.2"/>
      <path d="M-30,-155 C-15,-165 15,-165 30,-155" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.15"/>

      <!-- ===== 耳朵（小圆耳） ===== -->
      <path d="M-48,-152 C-52,-172 -62,-198 -44,-192 C-34,-188 -28,-168 -28,-160" 
            fill="none" stroke="#4A3A2A" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M-46,-156 C-50,-170 -56,-186 -46,-186" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.3"/>

      <path d="M48,-152 C52,-172 62,-198 44,-192 C34,-188 28,-168 28,-160" 
            fill="none" stroke="#4A3A2A" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M46,-156 C50,-170 56,-186 46,-186" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.3"/>

      <!-- ===== 眼睛（绿色大眼） ===== -->
      <!-- 左眼 -->
      <ellipse cx="-30" cy="-102" rx="18" ry="19" fill="#F0E8D8"/>
      <ellipse cx="-30" cy="-102" rx="18" ry="19" fill="none" stroke="#4A3A2A" stroke-width="2"/>
      <ellipse cx="-30" cy="-102" rx="12" ry="13" fill="#5A4A3A"/>
      <ellipse cx="-30" cy="-102" rx="9" ry="10" fill="#3A3A2A"/>
      <ellipse cx="-30" cy="-102" rx="5" ry="7" fill="#1A1A1A"/>
      <!-- 绿色 -->
      <ellipse cx="-27" cy="-106" rx="7" ry="4" fill="#80C058" opacity="0.75" transform="rotate(-12,-27,-106)"/>
      <!-- 高光 -->
      <circle cx="-24" cy="-109" r="5" fill="white" opacity="0.95"/>
      <circle cx="-35" cy="-98" r="2.5" fill="white" opacity="0.45"/>

      <!-- 右眼 -->
      <ellipse cx="30" cy="-102" rx="18" ry="19" fill="#F0E8D8"/>
      <ellipse cx="30" cy="-102" rx="18" ry="19" fill="none" stroke="#4A3A2A" stroke-width="2"/>
      <ellipse cx="30" cy="-102" rx="12" ry="13" fill="#5A4A3A"/>
      <ellipse cx="30" cy="-102" rx="9" ry="10" fill="#3A3A2A"/>
      <ellipse cx="30" cy="-102" rx="5" ry="7" fill="#1A1A1A"/>
      <ellipse cx="33" cy="-106" rx="7" ry="4" fill="#80C058" opacity="0.75" transform="rotate(12,33,-106)"/>
      <circle cx="36" cy="-109" r="5" fill="white" opacity="0.95"/>
      <circle cx="25" cy="-98" r="2.5" fill="white" opacity="0.45"/>

      <!-- 眼周 -->
      <path d="M-50,-102 C-40,-120 -20,-122 -14,-102" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M14,-102 C20,-122 40,-120 50,-102" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>

      <!-- ===== 鼻子 ===== -->
      <path d="M-6,-80 L6,-80 L0,-75 Z" fill="#D09080" stroke="#8A5A4A" stroke-width="0.8" stroke-linejoin="round"/>
      <path d="M0,-75 L0,-70" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3" fill="none"/>

      <!-- ===== 嘴巴 ===== -->
      <path d="M0,-70 L0,-64" stroke="#4A3A2A" stroke-width="0.8" fill="none"/>
      <path d="M-10,-68 C-4,-60 0,-64 0,-64" stroke="#4A3A2A" stroke-width="0.8" fill="none" stroke-linecap="round"/>
      <path d="M10,-68 C4,-60 0,-64 0,-64" stroke="#4A3A2A" stroke-width="0.8" fill="none" stroke-linecap="round"/>

      <!-- ===== 胡须 ===== -->
      <g opacity="0.4">
        <line x1="-22" y1="-84" x2="-72" y2="-94" stroke="#8A7A6A" stroke-width="0.7"/>
        <line x1="-22" y1="-78" x2="-74" y2="-76" stroke="#8A7A6A" stroke-width="0.7"/>
        <line x1="-22" y1="-72" x2="-70" y2="-62" stroke="#8A7A6A" stroke-width="0.7"/>
        <line x1="22" y1="-84" x2="72" y2="-94" stroke="#8A7A6A" stroke-width="0.7"/>
        <line x1="22" y1="-78" x2="74" y2="-76" stroke="#8A7A6A" stroke-width="0.7"/>
        <line x1="22" y1="-72" x2="70" y2="-62" stroke="#8A7A6A" stroke-width="0.7"/>
      </g>

    </g>
  </g>
</svg>
