<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <!-- 素描纸纹理 -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply"/>
    </filter>
    <!-- 铅笔纹理 -->
    <filter id="pencil">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <!-- 柔和阴影 -->
    <filter id="shadow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- 石墨粉效果 -->
    <filter id="graphite">
      <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- 暖白素描纸 -->
  <rect width="600" height="700" fill="#F5F0E6"/>
  <rect width="600" height="700" fill="#EDE8DC" opacity="0.3" filter="url(#paper)"/>

  <!-- 画面边界（轻轻勾勒） -->
  <rect x="30" y="30" width="540" height="640" rx="8" fill="none" stroke="#C8BEA8" stroke-width="0.8" opacity="0.3"/>

  <!-- ============================================================ -->
  <!-- 菠萝 — 矮脚金渐层 写实素描 -->
  <!-- ============================================================ -->
  <g transform="translate(300, 320)" filter="url(#pencil)">

    <!-- ========== 背景环境 — 绿色水磨石地面 ========== -->
    <!-- 地面线条 -->
    <path d="M-250,185 Q-120,165 0,165 Q120,165 250,185" fill="none" stroke="#A0A890" stroke-width="0.8" opacity="0.2"/>
    <path d="M-230,190 Q-100,172 0,172 Q100,172 230,190" fill="none" stroke="#A0A890" stroke-width="0.6" opacity="0.15"/>
    <!-- 水磨石石粒 -->
    <ellipse cx="-160" cy="178" rx="4" ry="3" fill="#B0B8A0" opacity="0.12"/>
    <ellipse cx="-80" cy="170" rx="3" ry="2" fill="#C0A880" opacity="0.1"/>
    <ellipse cx="50" cy="168" rx="5" ry="3" fill="#B0B8A0" opacity="0.12"/>
    <ellipse cx="140" cy="175" rx="3" ry="3" fill="#A09080" opacity="0.1"/>
    <ellipse cx="190" cy="182" rx="4" ry="2" fill="#B0B8A0" opacity="0.1"/>

    <!-- ========== 背景纸箱轮廓（极淡） ========== -->
    <rect x="-210" y="-130" width="70" height="80" rx="2" fill="none" stroke="#C8BEA8" stroke-width="0.6" opacity="0.12"/>
    <line x1="-210" y1="-110" x2="-140" y2="-110" stroke="#C8BEA8" stroke-width="0.5" opacity="0.1"/>
    <line x1="-210" y1="-90" x2="-140" y2="-90" stroke="#C8BEA8" stroke-width="0.5" opacity="0.1"/>
    
    <rect x="140" y="-140" width="60" height="70" rx="2" fill="none" stroke="#C8BEA8" stroke-width="0.6" opacity="0.1"/>
    <line x1="140" y1="-122" x2="200" y2="-122" stroke="#C8BEA8" stroke-width="0.5" opacity="0.08"/>

    <!-- ========== 圆形猫抓板 ========== -->
    <ellipse cx="190" cy="160" rx="35" ry="10" fill="none" stroke="#C8BEA8" stroke-width="0.6" opacity="0.1"/>
    <ellipse cx="190" cy="158" rx="30" ry="8" fill="none" stroke="#C8BEA8" stroke-width="0.5" opacity="0.08"/>

    <!-- ========== 尾巴 ========== -->
    <g filter="url(#graphite)">
      <!-- 尾巴底稿（轻轻勾勒） -->
      <path d="M-80,60 Q-125,70 -140,35 Q-150,0 -130,-35 Q-115,-60 -95,-45" 
            fill="none" stroke="#8A7A6A" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
      <!-- 尾巴主线条 -->
      <path d="M-75,58 Q-120,65 -135,32 Q-145,-2 -125,-32 Q-112,-52 -92,-40" 
            fill="none" stroke="#5A4A3A" stroke-width="2.2" stroke-linecap="round"/>
      <!-- 尾巴毛发排线 -->
      <path d="M-125,50 Q-130,45 -128,38" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-130,35 Q-135,28 -132,20" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-130,15 Q-135,8 -130,0" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-125,-15 Q-128,-22 -122,-28" fill="none" stroke="#5A4A3A" stroke-width="0.6" opacity="0.4"/>
      <path d="M-120,58 Q-125,52 -122,45" fill="none" stroke="#5A4A3A" stroke-width="0.5" opacity="0.3"/>
    </g>

    <!-- ========== 身体 — 圆润金渐层 ========== -->
    <g filter="url(#graphite)">
      <!-- 身体底稿（轻轮廓） -->
      <path d="M-72,-25 Q-88,15 -88,55 Q-88,95 -68,120 Q-40,140 0,140 Q40,140 68,120 Q88,95 88,55 Q88,15 72,-25" 
            fill="none" stroke="#8A7A6A" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
      
      <!-- 身体主轮廓 -->
      <path d="M-70,-22 Q-85,18 -85,58 Q-85,95 -65,118 Q-38,138 0,138 Q38,138 65,118 Q85,95 85,58 Q85,18 70,-22" 
            fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
      
      <!-- 身体阴影排线（左侧暗部） -->
      <path d="M-70,-15 Q-82,20 -82,58" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.3"/>
      <path d="M-65,-5 Q-78,25 -78,60" fill="none" stroke="#4A3A2A" stroke-width="0.7" opacity="0.25"/>
      <path d="M-60,5 Q-74,30 -74,62" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-65,70 Q-75,80 -72,92" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      
      <!-- 身体右侧排线 -->
      <path d="M70,-15 Q82,20 82,58" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M65,-5 Q78,25 78,60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>

      <!-- 腹部排线（毛流方向） -->
      <path d="M-30,125 Q0,135 30,125" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-20,130 Q0,138 20,130" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.15"/>
      
      <!-- 身体毛发排线 -->
      <path d="M-55,20 Q-58,25 -55,30" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M-52,35 Q-55,40 -52,45" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M-48,50 Q-52,55 -48,60" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <path d="M55,20 Q58,25 55,30" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
      <path d="M52,35 Q55,40 52,45" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- ========== 左后腿（矮脚） ========== -->
    <g filter="url(#graphite)">
      <path d="M-48,122 Q-55,148 -52,168 Q-48,178 -38,178 Q-28,178 -24,168 Q-20,155 -22,138" 
            fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
      <!-- 腿内侧排线 -->
      <path d="M-42,125 Q-48,145 -45,162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3"/>
      <!-- 脚趾 -->
      <path d="M-42,175 Q-40,178 -36,178" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <path d="M-32,178 Q-28,178 -26,175" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <!-- 脚部阴影 -->
      <ellipse cx="-38" cy="176" rx="12" ry="4" fill="#4A3A2A" opacity="0.08"/>
    </g>

    <!-- ========== 右后腿（矮脚） ========== -->
    <g filter="url(#graphite)">
      <path d="M48,122 Q55,148 52,168 Q48,178 38,178 Q28,178 24,168 Q20,155 22,138" 
            fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M42,125 Q48,145 45,162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3"/>
      <path d="M42,175 Q40,178 36,178" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <path d="M32,178 Q28,178 26,175" fill="none" stroke="#4A3A2A" stroke-width="0.8"/>
      <ellipse cx="38" cy="176" rx="12" ry="4" fill="#4A3A2A" opacity="0.08"/>
    </g>

    <!-- ========== 左前爪（举起） ========== -->
    <g filter="url(#graphite)">
      <path d="M-58,-10 Q-72,-38 -65,-72 Q-60,-88 -48,-88 Q-38,-88 -35,-72" 
            fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
      <!-- 爪子阴影排线 -->
      <path d="M-55,-15 Q-66,-40 -60,-70" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
      <path d="M-50,-20 Q-60,-42 -55,-68" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <!-- 爪垫 -->
      <circle cx="-48" cy="-85" r="2" fill="#4A3A2A"/>
      <circle cx="-55" cy="-85" r="2" fill="#4A3A2A"/>
      <ellipse cx="-51" cy="-79" rx="3.5" ry="2.5" fill="#4A3A2A"/>
      <!-- 小爪勾 -->
      <path d="M-46,-88 Q-44,-90 -45,-87" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
      <path d="M-53,-88 Q-55,-90 -54,-87" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
    </g>

    <!-- ========== 右前爪（举起） ========== -->
    <g filter="url(#graphite)">
      <path d="M58,-10 Q72,-38 65,-72 Q60,-88 48,-88 Q38,-88 35,-72" 
            fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M55,-15 Q66,-40 60,-70" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
      <path d="M50,-20 Q60,-42 55,-68" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.2"/>
      <circle cx="48" cy="-85" r="2" fill="#4A3A2A"/>
      <circle cx="55" cy="-85" r="2" fill="#4A3A2A"/>
      <ellipse cx="51" cy="-79" rx="3.5" ry="2.5" fill="#4A3A2A"/>
      <path d="M46,-88 Q44,-90 45,-87" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
      <path d="M53,-88 Q55,-90 54,-87" fill="none" stroke="#4A3A2A" stroke-width="0.6"/>
    </g>

    <!-- ========== 头部 — 金渐层圆脸 ========== -->
    <g filter="url(#graphite)">
      <!-- 头部底稿 -->
      <path d="M-70,-70 Q-78,-105 -62,-135 Q-40,-162 0,-166 Q40,-162 62,-135 Q78,-105 70,-70" 
            fill="none" stroke="#8A7A6A" stroke-width="1" opacity="0.25" stroke-linecap="round"/>
      
      <!-- 头部主轮廓 -->
      <path d="M-68,-68 Q-75,-102 -60,-132 Q-38,-158 0,-162 Q38,-158 60,-132 Q75,-102 68,-68" 
            fill="none" stroke="#4A3A2A" stroke-width="2.2" stroke-linecap="round"/>
      
      <!-- 脸颊丰满轮廓（金渐层肉脸） -->
      <path d="M-65,-72 Q-75,-80 -72,-92" fill="none" stroke="#4A3A2A" stroke-width="0.8" opacity="0.3"/>
      <path d="M65,-72 Q75,-80 72,-92" fill="none" stroke="#4A3A2A" stroke-width="0.8" opacity="0.3"/>
      
      <!-- 头部排线（毛流） -->
      <path d="M-40,-150 Q-20,-160 0,-162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M40,-150 Q20,-160 0,-162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.2"/>
      <path d="M-55,-140 Q-40,-155 -20,-158" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
      <path d="M55,-140 Q40,-155 20,-158" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- ========== 小圆耳 ========== -->
    <g filter="url(#graphite)">
      <!-- 左耳 -->
      <path d="M-45,-148 L-62,-195 L-25,-165" fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linejoin="round"/>
      <path d="M-43,-152 L-54,-182 L-30,-165" fill="none" stroke="#4A3A2A" stroke-width="0.8" opacity="0.4"/>
      <!-- 耳内绒毛 -->
      <path d="M-48,-168 Q-45,-172 -42,-168" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>
      <path d="M-52,-175 Q-48,-178 -45,-174" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>

      <!-- 右耳 -->
      <path d="M45,-148 L62,-195 L25,-165" fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linejoin="round"/>
      <path d="M43,-152 L54,-182 L30,-165" fill="none" stroke="#4A3A2A" stroke-width="0.8" opacity="0.4"/>
      <path d="M48,-168 Q45,-172 42,-168" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>
      <path d="M52,-175 Q48,-178 45,-174" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>

      <!-- 耳尖绒毛 -->
      <path d="M-60,-192 Q-58,-195 -55,-192" fill="none" stroke="#4A3A2A" stroke-width="0.8" opacity="0.4"/>
      <path d="M60,-192 Q58,-195 55,-192" fill="none" stroke="#4A3A2A" stroke-width="0.8" opacity="0.4"/>
    </g>

    <!-- ========== 大圆眼（金渐层标志） ========== -->
    <g>
      <!-- 左眼 -->
      <ellipse cx="-28" cy="-108" rx="17" ry="18" fill="#F0E8D8"/>
      <ellipse cx="-28" cy="-108" rx="17" ry="18" fill="none" stroke="#4A3A2A" stroke-width="1.8"/>
      <!-- 瞳孔 -->
      <ellipse cx="-28" cy="-108" rx="11" ry="12" fill="#5A4A3A"/>
      <ellipse cx="-28" cy="-108" rx="8" ry="9" fill="#3A3A2A"/>
      <ellipse cx="-28" cy="-108" rx="4" ry="6" fill="#1A1A1A"/>
      <!-- 虹膜绿色反光 -->
      <ellipse cx="-25" cy="-112" rx="5" ry="3" fill="#80A850" opacity="0.6" transform="rotate(-15,-25,-112)"/>
      <!-- 高光 -->
      <circle cx="-23" cy="-114" r="4.5" fill="white" opacity="0.9"/>
      <circle cx="-33" cy="-104" r="2" fill="white" opacity="0.4"/>

      <!-- 右眼 -->
      <ellipse cx="28" cy="-108" rx="17" ry="18" fill="#F0E8D8"/>
      <ellipse cx="28" cy="-108" rx="17" ry="18" fill="none" stroke="#4A3A2A" stroke-width="1.8"/>
      <ellipse cx="28" cy="-108" rx="11" ry="12" fill="#5A4A3A"/>
      <ellipse cx="28" cy="-108" rx="8" ry="9" fill="#3A3A2A"/>
      <ellipse cx="28" cy="-108" rx="4" ry="6" fill="#1A1A1A"/>
      <ellipse cx="31" cy="-112" rx="5" ry="3" fill="#80A850" opacity="0.6" transform="rotate(15,31,-112)"/>
      <circle cx="33" cy="-114" r="4.5" fill="white" opacity="0.9"/>
      <circle cx="23" cy="-104" r="2" fill="white" opacity="0.4"/>

      <!-- 眼睛周围轮廓 -->
      <path d="M-45,-108 Q-38,-120 -28,-122 Q-18,-120 -12,-108" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>
      <path d="M12,-108 Q18,-120 28,-122 Q38,-120 45,-108" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.3"/>
    </g>

    <!-- ========== 鼻子 ========== -->
    <g>
      <path d="M-7,-90 L7,-90 L0,-85 Z" fill="#D09080" stroke="#8A5A4A" stroke-width="0.8" stroke-linejoin="round"/>
      <!-- 鼻梁 -->
      <path d="M0,-85 L0,-78" stroke="#4A3A2A" stroke-width="0.6" opacity="0.4" fill="none"/>
    </g>

    <!-- ========== 嘴巴 ========== -->
    <g>
      <path d="M0,-78 L0,-72" stroke="#4A3A2A" stroke-width="1" fill="none"/>
      <path d="M-12,-76 Q0,-68 0,-72" stroke="#4A3A2A" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M12,-76 Q0,-68 0,-72" stroke="#4A3A2A" stroke-width="1" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ========== 胡须 ========== -->
    <g opacity="0.5">
      <line x1="-18" y1="-92" x2="-65" y2="-100" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="-18" y1="-86" x2="-68" y2="-84" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="-18" y1="-80" x2="-64" y2="-70" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="18" y1="-92" x2="65" y2="-100" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="18" y1="-86" x2="68" y2="-84" stroke="#8A7A6A" stroke-width="0.7"/>
      <line x1="18" y1="-80" x2="64" y2="-70" stroke="#8A7A6A" stroke-width="0.7"/>
    </g>

    <!-- ========== 粉色玩具 ========== -->
    <g filter="url(#graphite)">
      <!-- 玩具主体轮廓 -->
      <path d="M-16,-58 Q-28,-50 -30,-38 Q-32,-28 -24,-24 Q-16,-20 -8,-26 Q2,-32 4,-40 Q6,-50 -2,-56 Z" 
            fill="none" stroke="#A06060" stroke-width="1.5" stroke-linecap="round"/>
      <!-- 玩具排线 -->
      <path d="M-22,-48 Q-18,-46 -14,-48" fill="none" stroke="#A06060" stroke-width="0.6" opacity="0.4"/>
      <path d="M-20,-42 Q-16,-40 -12,-42" fill="none" stroke="#A06060" stroke-width="0.6" opacity="0.4"/>
      <path d="M-18,-36 Q-14,-34 -10,-36" fill="none" stroke="#A06060" stroke-width="0.6" opacity="0.4"/>
      <!-- 玩具标签 -->
      <path d="M-24,-24 Q-28,-16 -24,-10" fill="none" stroke="#A06060" stroke-width="1" stroke-linecap="round"/>
      <rect x="-28" y="-8" width="8" height="6" rx="1" fill="none" stroke="#A06060" stroke-width="0.7"/>
      <!-- 玩具阴影 -->
      <path d="M-20,-56 Q-10,-60 0,-56" fill="none" stroke="#4A3A2A" stroke-width="0.5" opacity="0.15"/>
    </g>

    <!-- ========== 金渐层毛尖色表现（额外排线） ========== -->
    <g filter="url(#graphite)" opacity="0.6">
      <!-- 脸颊毛尖 -->
      <path d="M-62,-82 Q-58,-78 -54,-82" fill="none" stroke="#7A6A4A" stroke-width="0.8" opacity="0.4"/>
      <path d="M-58,-72 Q-54,-68 -50,-72" fill="none" stroke="#7A6A4A" stroke-width="0.8" opacity="0.4"/>
      <path d="M62,-82 Q58,-78 54,-82" fill="none" stroke="#7A6A4A" stroke-width="0.8" opacity="0.4"/>
      <path d="M58,-72 Q54,-68 50,-72" fill="none" stroke="#7A6A4A" stroke-width="0.8" opacity="0.4"/>
      
      <!-- 背脊毛尖 -->
      <path d="M-30,-145 Q-15,-155 0,-158" fill="none" stroke="#7A6A4A" stroke-width="0.8" opacity="0.3"/>
      <path d="M30,-145 Q15,-155 0,-158" fill="none" stroke="#7A6A4A" stroke-width="0.8" opacity="0.3"/>
    </g>

    <!-- 签名-右下角铅笔手写 -->
    <g transform="translate(175, 185)" opacity="0.3">
      <text font-family="'Bradley Hand','cursive'" font-size="10" fill="#5A4A3A">菠萝</text>
    </g>
  </g>
</svg>
