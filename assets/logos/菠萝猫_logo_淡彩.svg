<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 550" width="500" height="550">
  <!-- 淡彩素描风格 - 铅笔线条 + 水彩渲染 -->
  
  <defs>
    <!-- 水彩纸纹理 -->
    <filter id="watercolor">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="softEdge">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <!-- 晕染效果 -->
    <filter id="bleed">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- 水彩纸背景 -->
  <rect width="500" height="550" fill="#FAF6EF"/>
  
  <!-- 圆形外框（淡墨水色） -->
  <circle cx="250" cy="270" r="228" fill="none" stroke="#C4A882" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="270" r="225" fill="none" stroke="#8B7355" stroke-width="2" opacity="0.4"/>

  <!-- ========== 水彩底色层（先铺色） ========== -->
  <g filter="url(#bleed)" opacity="0.35">
    <!-- 猫身体淡底色 - 暖棕色 -->
    <ellipse cx="250" cy="280" rx="60" ry="75" fill="#C4956A"/>
    <!-- 猫头部淡底色 -->
    <ellipse cx="250" cy="165" rx="50" ry="45" fill="#C4956A"/>
    <!-- 耳朵底色 -->
    <polygon points="212,132 200,88 235,125" fill="#C4956A"/>
    <polygon points="288,132 300,88 265,125" fill="#C4956A"/>
    <!-- 后腿淡底色 -->
    <ellipse cx="225" cy="365" rx="20" ry="15" fill="#C4956A"/>
    <ellipse cx="275" cy="365" rx="20" ry="15" fill="#C4956A"/>
    <!-- 爪子淡底色 -->
    <ellipse cx="200" cy="148" rx="15" ry="12" fill="#C4956A"/>
    <ellipse cx="300" cy="148" rx="15" ry="12" fill="#C4956A"/>
    <!-- 腹部浅色 -->
    <ellipse cx="250" cy="290" rx="35" ry="50" fill="#E8D5B7"/>
    <!-- 脸部浅色 -->
    <ellipse cx="250" cy="180" rx="35" ry="28" fill="#E8D5B7"/>
    <!-- 粉色玩具底色 -->
    <ellipse cx="250" cy="160" rx="20" ry="14" fill="#FFB5C0" transform="rotate(-10,250,160)"/>
  </g>

  <!-- 水彩阴影层 -->
  <g filter="url(#watercolor)" opacity="0.15">
    <ellipse cx="240" cy="395" rx="70" ry="12" fill="#8B7355"/>
  </g>

  <!-- ========== 铅笔线条层 ========== -->
  <g transform="translate(250,260)" filter="url(#watercolor)">
    
    <!-- 尾巴 -->
    <path d="M-60,30 Q-100,50 -110,20 Q-120,-20 -95,-50 Q-80,-65 -65,-40"
      fill="none" stroke="#5A4A3A" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M-60,30 Q-100,50 -110,20"
      fill="none" stroke="#5A4A3A" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

    <!-- 身体轮廓 -->
    <path d="M-42,-95 Q-58,-60 -58,-20 Q-58,40 -42,70 Q-22,88 0,88 Q22,88 42,70 Q58,40 58,-20 Q58,-60 42,-95"
      fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 后腿 -->
    <path d="M-35,70 Q-40,95 -35,112 Q-30,120 -20,120 Q-10,120 -5,112 Q-2,100 -5,85"
      fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M35,70 Q40,95 35,112 Q30,120 20,120 Q10,120 5,112 Q2,100 5,85"
      fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>

    <!-- 左前爪（举起） -->
    <path d="M-38,-50 Q-58,-80 -52,-112 Q-50,-122 -42,-122 Q-34,-122 -32,-112"
      fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
    <ellipse cx="-42" cy="-118" rx="8" ry="5" fill="#E8D5B7" opacity="0.5"/>
    <circle cx="-40" cy="-118" r="1.5" fill="#F0A0A0" opacity="0.6"/>
    <circle cx="-45" cy="-118" r="1.5" fill="#F0A0A0" opacity="0.6"/>

    <!-- 右前爪（举起） -->
    <path d="M38,-50 Q58,-80 52,-112 Q50,-122 42,-122 Q34,-122 32,-112"
      fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
    <ellipse cx="42" cy="-118" rx="8" ry="5" fill="#E8D5B7" opacity="0.5"/>
    <circle cx="40" cy="-118" r="1.5" fill="#F0A0A0" opacity="0.6"/>
    <circle cx="45" cy="-118" r="1.5" fill="#F0A0A0" opacity="0.6"/>

    <!-- ===== 头部 ===== -->
    <path d="M-48,-98 Q-52,-128 -42,-148 Q-25,-168 0,-170 Q25,-168 42,-148 Q52,-128 48,-98"
      fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 耳朵 -->
    <path d="M-38,-138 L-50,-172 L-25,-155" fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M38,-138 L50,-172 L25,-155" fill="none" stroke="#4A3A2A" stroke-width="1.8" stroke-linecap="round"/>

    <!-- 眼睛 - 温柔表情 -->
    <path d="M-25,-132 Q-20,-138 -15,-132" fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
    <path d="M15,-132 Q20,-138 25,-132" fill="none" stroke="#4A3A2A" stroke-width="2" stroke-linecap="round"/>
    <!-- 瞳孔 -->
    <ellipse cx="-20" cy="-133" rx="4" ry="5" fill="#4A3A2A"/>
    <ellipse cx="20" cy="-133" rx="4" ry="5" fill="#4A3A2A"/>
    <circle cx="-19" cy="-135" r="1.5" fill="#FAF6EF"/>
    <circle cx="21" cy="-135" r="1.5" fill="#FAF6EF"/>

    <!-- 鼻子 -->
    <path d="M-4,-121 Q0,-118 4,-121" fill="none" stroke="#E08080" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- 嘴巴 -->
    <path d="M0,-118 Q-8,-113 -12,-116" fill="none" stroke="#4A3A2A" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M0,-118 Q8,-113 12,-116" fill="none" stroke="#4A3A2A" stroke-width="1.2" stroke-linecap="round"/>

    <!-- 胡须 -->
    <line x1="-15" y1="-122" x2="-48" y2="-128" stroke="#4A3A2A" stroke-width="0.8" opacity="0.5"/>
    <line x1="-15" y1="-119" x2="-48" y2="-116" stroke="#4A3A2A" stroke-width="0.8" opacity="0.5"/>
    <line x1="15" y1="-122" x2="48" y2="-128" stroke="#4A3A2A" stroke-width="0.8" opacity="0.5"/>
    <line x1="15" y1="-119" x2="48" y2="-116" stroke="#4A3A2A" stroke-width="0.8" opacity="0.5"/>

    <!-- 毛发质感短线条 -->
    <path d="M-40,-148 Q-30,-158 0,-162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3"/>
    <path d="M40,-148 Q30,-158 0,-162" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.3"/>
    <path d="M-50,-40 Q-52,-35 -48,-30" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
    <path d="M-50,-10 Q-52,-5 -48,0" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
    <path d="M50,-40 Q52,-35 48,-30" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>
    <path d="M50,-10 Q52,-5 48,0" fill="none" stroke="#4A3A2A" stroke-width="0.6" opacity="0.25"/>

    <!-- ===== 粉色玩具 ===== -->
    <path d="M-16,-106 Q-28,-100 -30,-90 Q-32,-80 -24,-76 Q-16,-72 -8,-78 Q0,-84 2,-92 Q4,-102 -4,-106 Z"
      fill="none" stroke="#D4607A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- 玩具标签 -->
    <path d="M-24,-76 Q-28,-68 -24,-62" fill="none" stroke="#D4607A" stroke-width="1" stroke-linecap="round"/>
    <rect x="-28" y="-58" width="8" height="5" rx="1" fill="none" stroke="#D4607A" stroke-width="0.8"/>

  </g>

  <!-- ===== 文字 ===== -->
  <text x="250" y="510" text-anchor="middle" font-size="34" font-weight="bold"
    font-family="'KaiTi','STKaiti','SimSun','serif'" fill="#6B5A4A" 
    letter-spacing="6">菠萝</text>
  
  <text x="250" y="530" text-anchor="middle" font-size="10" 
    font-family="'Bradley Hand','cursive'" fill="#A09080" 
    letter-spacing="4">✦ Boluo ✦</text>

  <!-- 角落小菠萝 -->
  <g transform="translate(55,55)" opacity="0.06">
    <text font-size="28">🍍</text>
  </g>
  <g transform="translate(425,465)" opacity="0.06">
    <text font-size="22">🍍</text>
  </g>
</svg>
